<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0e6d3;font-family:-apple-system,sans-serif;}
.sg-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:20px 12px;padding:8px 4px 40px;}
.sg-card{cursor:pointer;}
.sg-book{width:100%;aspect-ratio:108/157;border-radius:2px 6px 6px 2px;overflow:hidden;
  box-shadow:2px 4px 12px rgba(0,0,0,.22),0 1px 3px rgba(0,0,0,.1);
  transition:transform .2s,box-shadow .2s;position:relative;background:#ddd;}
.sg-card:hover .sg-book{
  transform:translateY(-10px) scale(1.06) !important;
  box-shadow:4px 18px 36px rgba(0,0,0,.28);}
.sg-spine{position:absolute;left:0;top:0;bottom:0;width:6px;
  background:rgba(0,0,0,.18);z-index:2;}
.sg-label{margin-top:6px;}
.sg-en{font-size:.78rem;font-weight:700;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#3d2b1f;}
.sg-ko{font-size:.7rem;font-weight:600;color:#5a3e2b;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:1.1em;}
.sg-au{font-size:.6rem;color:#888;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-bottom:20px;}
@media(max-width:700px){.sg-grid{grid-template-columns:repeat(4,1fr);gap:12px 8px;}}
</style>
</head>
<body>
<div id="root"></div>
<script>
var PALETTES=[
  ["#e8c4a0","#c9956a"],["#d4e8c2","#8fbe6e"],["#c4cfe8","#6a82be"],
  ["#e8c4d4","#be6a95"],["#e8dfc4","#bea96a"],["#c4e8e8","#6abebe"],
  ["#d4c4e8","#8a6abe"],["#e8c4c4","#be6a6a"],["#c4e8d0","#6abe8a"],
  ["#e0e8c4","#9abe6a"]
];
var TILTS=[-4,1,-2,3,0,-1,2,-3,1,0];

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sendHeight(){
  requestAnimationFrame(function(){
    window.parent.postMessage({type:'streamlit:setFrameHeight',height:document.documentElement.scrollHeight},'*');
  });
}
function renderGrid(books){
  var root=document.getElementById('root');
  if(!books||!books.length){
    root.innerHTML='<p style="color:#888;padding:20px">불러오는 중…</p>';
    sendHeight();return;
  }
  var grid=document.createElement('div');
  grid.className='sg-grid';
  books.forEach(function(book,idx){
    var card=document.createElement('div');
    card.className='sg-card';
    card.dataset.bid=book.bid;
    var tilt=TILTS[idx%TILTS.length];
    var p=PALETTES[idx%PALETTES.length];
    var bookDiv=document.createElement('div');
    bookDiv.className='sg-book';
    bookDiv.style.transform='rotate('+tilt+'deg)';
    var spine=document.createElement('div');
    spine.className='sg-spine';
    bookDiv.appendChild(spine);
    if(book.cover){
      var img=document.createElement('img');
      img.src=book.cover;img.alt='';img.loading='lazy';
      img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
      bookDiv.appendChild(img);
    } else {
      var ph=document.createElement('div');
      ph.style.cssText='width:100%;height:100%;background:linear-gradient(160deg,'+p[0]+','+p[1]+');display:flex;flex-direction:column;justify-content:space-between;padding:12px 8px;';
      ph.innerHTML='<span style="color:#fff;font-size:.62rem;font-weight:700;line-height:1.4;text-align:center;">'+esc(book.short)+'</span>'
        +'<span style="color:rgba(255,255,255,.65);font-size:.52rem;text-align:center;">'+esc(book.author)+'</span>';
      bookDiv.appendChild(ph);
    }
    var label=document.createElement('div');
    label.className='sg-label';
    label.innerHTML='<div class="sg-en">'+esc(book.short)+'</div>'
      +'<div class="sg-ko">'+esc(book.ko||'')+'</div>'
      +'<div class="sg-au">'+esc(book.author||'')+'</div>';
    card.appendChild(bookDiv);
    card.appendChild(label);
    card.addEventListener('click',function(){
      window.parent.postMessage({
        type:'streamlit:setComponentValue',
        value:this.dataset.bid,
        dataType:'json'
      },'*');
    });
    grid.appendChild(card);
  });
  root.innerHTML='';
  root.appendChild(grid);
  sendHeight();
}

// 리스너를 먼저 등록한 뒤 componentReady 전송 (타이밍 버그 방지)
window.addEventListener('message',function(e){
  var msg=e.data;
  if(!msg||msg.type!=='streamlit:render')return;
  renderGrid((msg.args&&msg.args.books)||[]);
});

window.parent.postMessage({type:'streamlit:componentReady',apiVersion:1},'*');
</script>
</body>
</html>
